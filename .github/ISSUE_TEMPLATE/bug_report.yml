name: Bug report
description: Something is broken in Rekindle. Use this for crashes, incorrect behavior, or regressions.
title: "[bug] <one-line summary>"
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much of the
        information below as you can.

        **Security vulnerabilities should not be filed here.** See
        [`SECURITY.md`](https://github.com/ScopeCreep-zip/Rekindle/blob/main/SECURITY.md)
        for the private disclosure channel.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
      placeholder: When I do X, Y happens. I expected Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Numbered steps that another contributor can follow to see the bug.
      placeholder: |
        1. Launch Rekindle.
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include error messages, stack traces, or screenshots.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Rekindle version
      description: Version number (or commit hash if you built from source).
      placeholder: "v0.0.0-dev or commit abc1234"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      multiple: false
      options:
        - Linux (specify distro/version below)
        - macOS (specify version below)
        - Windows 11
        - Windows 10
        - Other
    validations:
      required: true

  - type: input
    id: os-detail
    attributes:
      label: OS version detail
      description: Distro + version, macOS version, or Windows build.
      placeholder: "Ubuntu 24.04 / macOS 26.4 / Windows 11 23H2"

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem affected
      description: Best guess — leave blank if unsure.
      multiple: true
      options:
        - "1:1 messaging"
        - "Communities"
        - "DMs / group DMs"
        - "Voice / video"
        - "Game detection"
        - "File sharing"
        - "Cross-device sync"
        - "Strand Relay / Push Relay"
        - "Frontend / UI"
        - "Tauri shell / window management"
        - "Daemon / CLI"
        - "Build / packaging"
        - "Other / unsure"

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Relevant log output, if any. Strip personally identifying information
        and any cryptographic keys before pasting.
      render: shell

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I have not included secrets, private keys, or session data in this report.
          required: true
        - label: This is not a security vulnerability (those go to SECURITY.md).
          required: true
