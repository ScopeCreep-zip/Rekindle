# CISA KEV catalog check — weekly correlation of our dependency
# graph against the CISA Known Exploited Vulnerabilities catalog.
#
# Reference: https://www.cisa.gov/known-exploited-vulnerabilities-catalog
#            BOD 22-01 (federal context; we adopt the spirit, not the
#            specific deadlines).
#
# If a transitive dependency has a CVE that appears in the KEV catalog,
# we want to know within a week and triage immediately.

name: KEV Catalog Check

on:
  schedule:
    # Weekly — Wednesday 06:00 UTC. Mid-week so a finding has fresh
    # eyes from the maintainer; staggered from the daily audit.yml.
    - cron: "0 6 * * 3"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Cross-reference CVEs against CISA KEV
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit (JSON output)
        id: cargo-audit
        run: |
          cargo audit --json > audit.json || true
          # Don't fail the job on advisory hits; we want to compare
          # against KEV first.

      - name: Download CISA KEV catalog (CSV)
        run: |
          curl -fsSL \
            -o kev.csv \
            https://www.cisa.gov/sites/default/files/csv/known_exploited_vulnerabilities.csv

      - name: Cross-reference
        id: cross-ref
        run: |
          set -euo pipefail
          # Extract CVE IDs from the audit output.
          # cargo-audit's JSON shape: vulnerabilities.list[].advisory.aliases[]
          if [[ ! -s audit.json ]]; then
            echo "no audit findings — clean"
            echo "kev_matches=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          jq -r '.vulnerabilities.list[].advisory.aliases[]?' audit.json \
            | grep -E '^CVE-[0-9]{4}-[0-9]+$' \
            | sort -u \
            > our-cves.txt || true
          if [[ ! -s our-cves.txt ]]; then
            echo "no CVE-format aliases in audit findings"
            echo "kev_matches=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Our CVEs:"
          cat our-cves.txt
          # KEV CSV column 1 is the cveID.
          tail -n +2 kev.csv | cut -d, -f1 | sort -u > kev-cves.txt
          comm -12 our-cves.txt kev-cves.txt > matches.txt || true
          if [[ -s matches.txt ]]; then
            echo "::error::Transitive dependency CVE present in CISA KEV catalog"
            cat matches.txt
            echo "kev_matches=$(wc -l < matches.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "no KEV matches"
            echo "kev_matches=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on KEV match
        if: steps.cross-ref.outputs.kev_matches != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const matches = fs.readFileSync('matches.txt', 'utf8').trim();
            const title = `[security] CVE in CISA KEV catalog matches our dependency graph`;
            const body = [
              '## CISA KEV catalog match',
              '',
              'The weekly KEV check found one or more CVEs from our dependency graph',
              'in the [CISA Known Exploited Vulnerabilities catalog](https://www.cisa.gov/known-exploited-vulnerabilities-catalog).',
              '',
              'Per `docs/security/supply-chain-policy.md`, these require triage within 48 hours.',
              '',
              '### Matched CVEs',
              '',
              '```',
              matches,
              '```',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'kev', 'priority-high'],
            });
