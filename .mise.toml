# mise.toml — Task automation for Rekindle
# Dependencies: cargo, docker compose

[settings]
experimental = true
task_output = "prefix"

[env]
_.file = [".env.example", { path = ".env", required = false }]

[task_config]
includes = [
    ".config/mise/toml/rekindle.compose.toml",
    ".config/mise/toml/rekindle.test.toml",
]
