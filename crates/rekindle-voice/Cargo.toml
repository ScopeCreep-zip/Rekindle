[package]
name = "rekindle-voice"
version = "0.1.0"
edition = "2021"
description = "Voice chat engine with Opus codec for Rekindle"

[lints]
workspace = true

[dependencies]
tokio = { workspace = true }
bytes = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
opus = "0.3"
cpal = "0.15"
dasp_sample = "0.11"
nnnoiseless = "0.5"
aec3 = "0.1"
veilid-core = { version = "0.5.2", features = ["footgun"] }
bincode = "1"
ed25519-dalek = "2"
# Wave 13 W13.14 — AEAD audio encryption under the X25519-ECDH-derived
# call_key for 1:1 calls. Architecture §10.10 mandates audio be
# encrypted under call_key; previously only signed (Veilid private
# routes encrypted at transport, but exposed if a relay node compromised
# or a route blob leaked).
chacha20poly1305 = "0.10"
rekindle-route = { path = "../rekindle-route" }

[dev-dependencies]
# Phase 7 Week 26 — voice latency benchmark (architecture line 4147,
# target <100ms mouth-to-ear).
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "latency"
harness = false
