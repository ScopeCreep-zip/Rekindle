# Rekindle daemon kernel tuning for bulk transport performance.
#
# Install: sudo cp contrib/sysctl/99-rekindle.conf /etc/sysctl.d/
# Apply:   sudo sysctl --system
#
# These settings optimize AF_UNIX socket buffer sizes and memory
# management for 10+ Gbps encrypted IPC throughput.

# ── Socket buffers ──────────────────────────────────────────────────
# Maximum send/receive buffer size for setsockopt(SO_SNDBUF/SO_RCVBUF).
# The kernel doubles the value set by setsockopt, so setting 4 MiB
# here allows an effective 8 MiB buffer per socket.
# Default: 212992 (208 KiB) — too small for 64 KiB chunk bursts.
net.core.wmem_max = 8388608
net.core.rmem_max = 8388608

# Default socket buffer sizes (used when setsockopt is not called).
# 2 MiB default allows ~28 × 64 KiB chunks in flight without backpressure.
net.core.wmem_default = 2097152
net.core.rmem_default = 2097152

# Ancillary data buffer size (SCM_RIGHTS fd passing, SCM_INQ).
net.core.optmem_max = 131072

# ── Memory management ──────────────────────────────────────────────
# Maximum number of memory map areas per process.
# Needed for io_uring registered buffer regions.
vm.max_map_count = 262144

# ── NUMA (single-socket systems: no-op) ────────────────────────────
# Disable automatic NUMA balancing. On single-socket systems this is
# already a no-op but eliminates the periodic kernel scanner overhead.
kernel.numa_balancing = 0

# ── Unix domain socket ─────────────────────────────────────────────
# Maximum datagram queue length (SOCK_DGRAM/SOCK_SEQPACKET only).
# Does NOT affect SOCK_STREAM (the bulk transport socket type).
# Increase for bursty control-plane messages on DGRAM sockets.
net.unix.max_dgram_qlen = 512
