[package]
name = "rekindle-transport"
version = "0.1.0"
edition = "2021"
description = "Unified network transport layer for Rekindle — sole Veilid boundary"
license = "MIT"

[lints]
workspace = true

[dependencies]
# Workspace
rekindle-types = { path = "../rekindle-types" }
rekindle-utils = { path = "../rekindle-utils" }
rekindle-calls = { path = "../rekindle-calls" }

# Veilid — the ONLY crate in the workspace that imports this
veilid-core = { version = "0.5.2", default-features = true }

# Async
tokio = { workspace = true }
futures = { workspace = true }
async-trait = "0.1"
backoff = "0.4"

# Serialization — postcard for wire, serde for trait bounds
serde = { workspace = true }
serde_json = { workspace = true }
postcard = { version = "1", features = ["use-std"] }

# Crypto
ed25519-dalek = { version = "2", features = ["rand_core", "zeroize"] }
x25519-dalek = { version = "2", features = ["static_secrets"] }
aes-gcm = "0.10"
hkdf = "0.12"
sha2 = "0.10"
blake3 = "1"
rand = { workspace = true }
zeroize = { version = "1", features = ["derive"] }

# Data structures
parking_lot = { workspace = true }
indexmap = "2"
bitflags = { version = "2", features = ["serde"] }

# Identity generation
uuid = { version = "1", features = ["v4", "fast-rng"] }

# Logging
tracing = { workspace = true }
thiserror = { workspace = true }
hex = "0.4"

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
tempfile = "3"
proptest = "1"
