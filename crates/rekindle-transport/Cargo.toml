[package]
name = "rekindle-transport"
version = "0.2.0"
edition = "2021"
rust-version = "1.87"
description = "Transport provider registry for the Rekindle messaging platform"
license = "MIT"

[lints]
workspace = true

[features]
default = ["veilid"]
veilid = ["dep:rekindle-transport-veilid"]
ipc = ["dep:rekindle-transport-ipc"]

[dependencies]
rekindle-types = { path = "../rekindle-types" }
rekindle-transport-veilid = { path = "../rekindle-transport-veilid", optional = true }
rekindle-transport-ipc = { path = "../rekindle-transport-ipc", optional = true }
